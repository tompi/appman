<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bridge Scoring Helper</title>
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 720px;
            margin: 48px auto;
            padding: 0 24px 64px;
            color: #1a1a1a;
            line-height: 1.7;
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 0.25em;
        }
        p {
            color: #444;
            margin-bottom: 2em;
        }
        .badges {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .badges a img {
            height: 52px;
        }
        .screenshots {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 32px 4px 16px;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
        .screenshots img {
            height: 480px;
            width: auto;
            border-radius: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            scroll-snap-align: start;
            flex-shrink: 0;
        }
        footer {
            margin-top: 64px;
            font-size: 0.85rem;
            color: #888;
        }
        footer a {
            color: #888;
            text-decoration: none;
        }
        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Bridge Scoring Helper</h1>
    <p>A scoring helper for the card game Bridge. Available for iOS and Android.</p>

    <div class="badges">
        <a href="https://apps.apple.com/app/id1455659697" target="_blank" rel="noopener">
            <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Download on the App Store" />
        </a>
        <a href="https://play.google.com/store/apps/details?id=no.appman.brisco" target="_blank" rel="noopener">
            <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" alt="Get it on Google Play" />
        </a>
    </div>

    <div class="screenshots">
        <img src="screenshots/7.png" alt="Home screen" />
        <img src="screenshots/2.png" alt="Score calculator" />
        <img src="screenshots/5.png" alt="Rubber bridge score sheet" />
        <img src="screenshots/6.png" alt="Chicago score sheet" />
        <img src="screenshots/1.png" alt="Teams score view" />
        <img src="screenshots/3.png" alt="Score sheet list" />
        <img src="screenshots/4.png" alt="Auction entry" />
        <img src="screenshots/8.png" alt="Enter deal" />
    </div>

    <footer>
        <a href="support.html">Support</a> &middot; <a href="privacy.html">Privacy Policy</a>
    </footer>
</body>
</html>
